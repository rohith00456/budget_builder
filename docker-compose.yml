version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finbudget_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finbudget
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finbudget_net

  redis:
    image: redis:7-alpine
    container_name: finbudget_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finbudget_net

  python_processor:
    build:
      context: ./python_processor
      dockerfile: Dockerfile
    container_name: finbudget_python
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      FLASK_ENV: development
      PORT: 5001
    volumes:
      - ./python_processor:/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finbudget_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finbudget_backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/finbudget
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-minimum-32-chars-here
      FRONTEND_URL: http://localhost:3000
      PYTHON_SERVICE_URL: http://python_processor:5001
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STORAGE_MODE: local
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finbudget_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finbudget_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-nextauth-secret-here
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - backend
    networks:
      - finbudget_net

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  finbudget_net:
    driver: bridge
