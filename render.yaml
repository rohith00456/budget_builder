services:
  - type: web
    name: finbudget-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run migrate:deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: finbudget-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend.onrender.com
      - key: BYPASS_AUTH
        value: "false"
      - key: PYTHON_SERVICE_URL
        value: https://finbudget-python-processor.onrender.com

  - type: web
    name: finbudget-python-processor
    env: python
    plan: free
    region: singapore
    buildCommand: cd python_processor && pip install -r requirements.txt
    startCommand: cd python_processor && gunicorn --bind 0.0.0.0:$PORT processors.app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5001

databases:
  - name: finbudget-db
    plan: free
    region: singapore
